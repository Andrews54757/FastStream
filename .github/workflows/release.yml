name: Build and publish release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v1.x.x)"
        required: true
        type: string
      target_commitish:
        description: "Branch or commit to tag/release"
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_commitish || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            TARGET_SHA="${GITHUB_SHA}"
          else
            TAG_NAME="${{ inputs.tag_name }}"
            TARGET_SHA="$(git rev-parse "${{ inputs.target_commitish }}^{commit}")"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "target_commitish=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundles
        run: npm run build

      - name: Generate release description
        shell: bash
        run: |
          set -euo pipefail

          TARGET_SHA="${{ steps.vars.outputs.target_commitish }}"
          CHANGELOG_URL="https://github.com/WyvrnRes/FastStream-for-Mobile/commits/Mobile-Experience-Improvements"

          TODAY_LOG_REF="${TARGET_SHA}"
          TODAY_LOG_LABEL="this release commit"
          if git ls-remote --exit-code --heads origin "Mobile-Experience-Improvements" >/dev/null 2>&1; then
            git fetch origin "Mobile-Experience-Improvements" --depth=1 >/dev/null 2>&1 || true
            TODAY_LOG_REF="origin/Mobile-Experience-Improvements"
            TODAY_LOG_LABEL="Mobile-Experience-Improvements"
          fi

          TODAY_UTC="$(date -u +%Y-%m-%d)"
          COMMIT_COUNT="$(git rev-list --count --no-merges --since="${TODAY_UTC} 00:00:00" "${TODAY_LOG_REF}" 2>/dev/null || echo 0)"

          awk '
            /^# Mobile Experience Improvements \[NEW\]/ { in_section=1 }
            in_section && /^## / { exit }
            in_section { print }
          ' README.md > release_body.md

          # GitHub release bodies do not reliably resolve relative image paths.
          # Convert docs image links to absolute raw URLs at the release commit.
          sed -i -E "s#\]\((docs/images/[^)]+)\)#](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TARGET_SHA}/\1)#g" release_body.md
          sed -i -E "s#src=\"(docs/images/[^\"]+)\"#src=\"https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TARGET_SHA}/\1\"#g" release_body.md

          {
            echo
            echo "### Today's commit messages"
            echo
            if [[ "${COMMIT_COUNT}" -gt 0 ]]; then
              git log --no-merges --since="${TODAY_UTC} 00:00:00" --pretty='- %s (%h)' "${TODAY_LOG_REF}"
            else
              echo "- No commits were found for today on ${TODAY_LOG_LABEL}."
            fi
            echo
            echo "Full changelog: ${CHANGELOG_URL}"
          } >> release_body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          target_commitish: ${{ steps.vars.outputs.target_commitish }}
          body_path: release_body.md
          files: |
            built/*.zip
            built/*.xpi
