name: Build and publish release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v1.3.75)"
        required: true
        type: string
      target_commitish:
        description: "Branch or commit to tag/release"
        required: false
        default: new-features
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_commitish || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "target_commitish=${{ inputs.target_commitish }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundles
        run: npm run build

      - name: Generate release description
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.vars.outputs.tag_name }}"
          TARGET_COMMITISH="${{ steps.vars.outputs.target_commitish }}"
          git fetch --tags --force

          if git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            CURRENT_REF="${TAG_NAME}"
          else
            CURRENT_REF="${TARGET_COMMITISH}"
          fi

          PREV_TAG="$(git tag --merged "${CURRENT_REF}" --sort=-creatordate | grep -Fxv "${TAG_NAME}" | head -n 1 || true)"

          if [[ -n "${PREV_TAG}" ]]; then
            RANGE="${PREV_TAG}..${CURRENT_REF}"
            CHANGELOG_URL="${{ github.server_url }}/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME}"
            RANGE_TEXT="Changes since ${PREV_TAG}"
          else
            RANGE="${CURRENT_REF}"
            CHANGELOG_URL="${{ github.server_url }}/${{ github.repository }}/commits/${TARGET_COMMITISH}"
            RANGE_TEXT="Latest included changes"
          fi

          COMMIT_COUNT="$(git rev-list --count "${RANGE}" 2>/dev/null || echo 0)"

          {
            echo "## ${TAG_NAME}"
            echo
            echo "${RANGE_TEXT}: ${COMMIT_COUNT} commit(s)."
            echo
            echo "### Summary"
            echo
            git log --no-merges --max-count=12 --pretty='- %s (%h)' "${RANGE}"
            echo
            echo "Full changelog: ${CHANGELOG_URL}"
          } > release_body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          target_commitish: ${{ steps.vars.outputs.target_commitish }}
          body_path: release_body.md
          files: |
            built/*.zip
            built/*.xpi
