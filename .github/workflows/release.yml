name: Build and Publish Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (x.y.z)"
        required: true
        type: string
      target_branch:
        description: "Branch to build from"
        required: false
        default: "new-features"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Validate release version format
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.release_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release_version: ${{ github.event.inputs.release_version }}"
            echo "Expected format: x.y.z"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build extension artifacts with requested version
        env:
          FASTSTREAM_BUILD_VERSION: ${{ github.event.inputs.release_version }}
        run: npm run build

      - name: Determine previous release tag
        id: prev_release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const latest = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('tag', latest.data.tag_name || '');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('tag', '');
                return;
              }
              throw error;
            }

      - name: Generate release notes with changelog
        id: notes
        shell: bash
        env:
          PREV_TAG: ${{ steps.prev_release.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -n "${PREV_TAG}" ]]; then
            CHANGELOG_RANGE="${PREV_TAG}..HEAD"
          else
            CHANGELOG_RANGE="HEAD"
          fi

          TODAY_UTC="$(date -u +%Y-%m-%d)"
          TODAY_RANGE="HEAD"

          {
            echo '# Mobile Experience Improvements [GENERAL RELEASE NOTES]'
            echo '![Tap-Controls Guide](https://github.com/WyvrnRes/FastStream-for-Mobile/raw/new-features/docs/images/tap-zones.svg)'
            echo
            echo 'New to this fork? The quickest way to make the mobile controls feel right is to open Options and set these first:'
            echo
            echo '- **Seek step size**: controls how far left/right double-tap seeks, and also updates the number shown on the skip buttons.'
            echo '- **Single / double / triple tap actions**: the **middle zone** uses your configured tap actions, so you can make it play/pause, fullscreen, PiP, and more.'
            echo '- **Controls hide delay**: useful on phones if you want the controls to stay visible longer or get out of the way faster.'
            echo '- **Toolbar buttons**: lets you show/hide buttons, including the simplified **Rotate** tool, if you want a cleaner mobile layout.'
            echo
            echo 'Notes for new users:'
            echo
            echo '- The touch improvements are mainly designed for mobile, but browser support for extensions and orientation APIs still varies by device.'
            echo '- The **Rotate** button is now a practical portrait/landscape toggle rather than a full free-rotation control.'
            echo '- If you customize too much, the settings categories each have their own **Reset** button to restore the default selection.'
            echo
            echo '- **Configurable auto-hide controls**'
            echo '  - New **Controls hide delay** setting lets you choose how quickly the on-screen controls fade away after you stop interacting.'
            echo '  - Helps reduce the controls blocking video content on smaller screens.'
            echo
            echo '- **Skip buttons show the seek step**'
            echo '  - Skip forward/back buttons now display a small number overlay (e.g., ) so you can see the current seek step at a glance.'
            echo
            echo '- **Simpler rotate control (better on phones)**'
            echo '  - The **Rotate** button is moved to the main toolbar for faster access.'
            echo '  - Rotation is simplified to a practical **portrait <-> landscape** toggle.'
            echo
            echo '- **Customize the toolbar for mobile**'
            echo '  - New **Toolbar** section in Options lets you **show/hide** specific toolbar buttons (with icons) to reduce clutter.'
            echo '  - Includes a **Reset** button to restore the default toolbar configuration.'
            echo '  - Changes persist and are applied across the player.'
            echo
            echo '- **Improved mobile options/menu usability**'
            echo '  - Options UI and the in-player options window were adjusted for mobile usability and accessibility (easier tapping, clearer layout).'
            echo
            echo '- **Theme picker redesigned with visual cards**'
            echo '  - Color themes are now shown in a card gallery with previews, making it faster to compare styles on small screens.'
            echo
            echo '- **More consistent collapsible settings sections**'
            echo '  - Section collapse behavior (Theme, Video, General, Toolbar, Keybinds) is now handled consistently, including better behavior when using search.'
            echo '  - Show/Hide section toggle labels are localized so they match your selected language.'
            echo
            echo '- **Less likely to be covered by website overlays**'
            echo '  - The player/miniplayer is now more aggressively kept above site overlays (stacking/z-index improvements), reducing cases where parts of the player are blocked or unclickable.'
            echo
            echo '- **Updated mobile/touch tips**'
            echo '  - Welcome/help text and translations were updated with mobile and touch guidance to make these features easier to discover.'
            echo
            echo "### Today's commit messages"
            if [[ -n "$(git log --since="${TODAY_UTC} 00:00:00" --pretty=format:'%h' ${TODAY_RANGE})" ]]; then
              git log --since="${TODAY_UTC} 00:00:00" --pretty=format:'- %s (%h)' --reverse ${TODAY_RANGE}
            else
              echo '- No commits found today.'
            fi
            echo
            echo
            echo '### Changelog since last release'
            if [[ -n "$(git log --pretty=format:'%h' ${CHANGELOG_RANGE})" ]]; then
              git log --pretty=format:'- `%h` %s (%an)' --reverse ${CHANGELOG_RANGE} || true
            else
              echo '- No changes since the last release.'
            fi
            echo
            echo
            echo 'Full changelog: https://github.com/WyvrnRes/FastStream-for-Mobile/commits/new-features'
          } > release_notes.md

      - name: Ensure built artifacts include selected version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail
          found=0
          for artifact in built/*.zip built/*.xpi; do
            if [[ -f "$artifact" ]]; then
              found=1
              base="$(basename "$artifact")"
              if [[ "$base" != *"${RELEASE_VERSION}"* ]]; then
                echo "Artifact does not include release version: $base"
                exit 1
              fi
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo 'No built release artifacts found in built/*.zip or built/*.xpi'
            exit 1
          fi

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          name: FastStream v${{ github.event.inputs.release_version }}
          target_commitish: ${{ github.event.inputs.target_branch }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            built/*.zip
            built/*.xpi
