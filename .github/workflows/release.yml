name: Build and publish release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v1.3.75)"
        required: true
        type: string
      target_commitish:
        description: "Branch or commit to tag/release"
        required: true
        default: new-features
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_commitish || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "target_commitish=${{ inputs.target_commitish }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundles
        run: npm run build

      - name: Generate release description
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.vars.outputs.tag_name }}"
          BASE_REF="1.3.75"
          TARGET_REF="new-features"
          CHANGELOG_URL="https://github.com/WyvrnRes/FastStream/compare/1.3.75...new-features"

          git fetch --tags --force
          git fetch origin "${TARGET_REF}:${TARGET_REF}" --force

          RANGE="${BASE_REF}..${TARGET_REF}"
          TODAY_UTC="$(date -u +%Y-%m-%d)"
          COMMIT_COUNT="$(git rev-list --count --no-merges --since="${TODAY_UTC} 00:00:00" "${RANGE}" 2>/dev/null || echo 0)"

          {
            echo "## ${TAG_NAME}"
            echo
            echo "Today's commits (${TODAY_UTC} UTC) in ${BASE_REF}...${TARGET_REF}: ${COMMIT_COUNT} commit(s)."
            echo
            echo "### Today's commit messages"
            echo
            if [[ "${COMMIT_COUNT}" -gt 0 ]]; then
              git log --no-merges --since="${TODAY_UTC} 00:00:00" --pretty='- %s (%h)' "${RANGE}"
            else
              echo "- No commits were found for today in this compare range."
            fi
            echo
            echo "Full changelog: ${CHANGELOG_URL}"
          } > release_body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          target_commitish: ${{ steps.vars.outputs.target_commitish }}
          body_path: release_body.md
          files: |
            built/*.zip
            built/*.xpi
